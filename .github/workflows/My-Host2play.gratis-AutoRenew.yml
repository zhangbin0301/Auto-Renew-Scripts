name: My-Host2play.gratis-AutoRenew

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 8:00 / 16:00 UTC，间隔约 8 小时，接近 7.5 小时
    - cron: "0 0,7,15,23 * * *"

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 检出私库 Host2Play 脚本
      # =========================
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/My-Host2play.gratis-AutoRenew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # ⚡ Node.js
      # =========================
      - name: ⚡ 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 📦 系统依赖
      # =========================
      - name: 📦 安装系统依赖
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      # =========================
      # 🌐 启动 Cloudflare WARP
      # =========================
      - name: 🌐 启动 Cloudflare WARP (强制 IPv4 模式)
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: ipv4
          mode: client

      # =========================
      # 📦 Node 依赖 + Playwright Chromium
      # =========================
      - name: 📦 安装 Node 依赖
        working-directory: scripts
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      # =========================
      # 📦 下载 Buster 扩展
      # =========================
      - name: 🧩 下载 Buster 扩展
        working-directory: scripts
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip

      - name: 🧩 解压 Buster 扩展
        working-directory: scripts
        run: |
          mkdir -p extensions/buster/unpacked
          unzip -o extensions/buster/buster.zip -d extensions/buster/unpacked
          echo "📌 manifest.json:"
          cat extensions/buster/unpacked/manifest.json

      # =========================
      # 🚀 执行续费脚本
      # =========================
      - name: 🚀 执行续费提示脚本
        working-directory: scripts
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      # =========================
      # 📤 上传截图（路径修正）
      # =========================
      - name: 📤 上传运行截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6

      # 🕐 更新运行时间记录
      - name: 🕐 更新运行时间
        working-directory: scripts
        run: |
          echo "Last run: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')" > time.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add time.txt
          git diff --cached --quiet || git commit -m "🕐 更新运行时间"
          git push || true

      # 🧹 清理超24小时的运行记录
      - name: 🧹 清理历史运行记录
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 86400
