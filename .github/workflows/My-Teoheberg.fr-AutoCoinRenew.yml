name: My-Teoheberg.fr-AutoCoinRenew

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔍 诊断工作目录内容
        run: |
          echo "当前工作目录内容："
          ls -R

      - name: 📦 安装依赖 (含 ffmpeg)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m camoufox fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌐 启动 Cloudflare WARP (强制全局模式)
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: warp

      - name: 🚀 运行机器人
        env:
          TEOHEBERG_EMAIL: ${{ secrets.TEOHEBERG_EMAIL }}
          TEOHEBERG_PASSWORD: ${{ secrets.TEOHEBERG_PASSWORD }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 只要上面的 WARP 步骤运行了，我们就告诉脚本尝试旋转
          ENABLE_WARP: 'true'
        run: |
          mkdir -p screenshots
          python bot.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 3

      - name: 📝 生成运行摘要
        if: always()
        run: |
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🧹 清理历史记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
