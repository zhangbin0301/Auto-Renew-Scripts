name: Host2play.gratis-AutoRenew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *' # 示例：每 7 小时运行一次 (UTC时间)

permissions:
  contents: write
  actions: write

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Host2play.gratis-AutoRenew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}        
          fetch-depth: 0     

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: Install Xray Core
        run: |
          echo "⬇️ 正在下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray_bin

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          HOST2_RENEW_URL: ${{ secrets.HOST2_RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 传入代理地址供 Python 脚本读取
          PROXY: http://127.0.0.1:10808 
        run: python main.py 

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.html 
          retention-days: 5
