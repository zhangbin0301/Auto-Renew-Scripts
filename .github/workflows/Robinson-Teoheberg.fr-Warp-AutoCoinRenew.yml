name: Robinson-Teoheberg.fr-Warp-AutoCoinRenew

on:
  workflow_dispatch:
  schedule:
    - cron: "40 10 */29 * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Robinson-Teoheberg.fr-Warp-AutoCoinRenew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # WARP（提供干净 IP）
      # =========================
      - name: 创建 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 系统依赖
      # xvfb + pulseaudio（Buster 音频需要）
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg

          pulseaudio --start --exit-idle-time=-1 || true
          sleep 1
          pactl load-module module-null-sink \
            sink_name=virtual_speaker \
            sink_properties=device.description=VirtualSpeaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source \
            source_name=virtual_mic \
            master=virtual_speaker.monitor || true
          pactl set-default-source virtual_mic || true
          echo "🔊 虚拟音频就绪"

      # =========================
      # Node 依赖
      # playwright  : 登录页 reCAPTCHA + Buster
      # patchright  : bypass.city Turnstile（主方案）
      # =========================
      - name: 安装 Node 依赖
        run: |
          cd scripts
          npm init -y
          npm install playwright patchright
          npx playwright install chromium
          npx playwright install-deps chromium
          npx patchright install chrome
          echo "✅ playwright + patchright 安装完成"

      # =========================
      # Buster 扩展（登录页 reCAPTCHA）
      # =========================
      - name: 下载 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip

      - name: 解压 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster/unpacked
          7z x -y scripts/extensions/buster/buster.zip \
            -oscripts/extensions/buster/unpacked > /dev/null
          ls scripts/extensions/buster/unpacked/manifest.json && \
            echo "✅ Buster OK" || echo "❌ Buster manifest 缺失"

      # =========================
      # NopeCHA 扩展（bypass.city Turnstile 备用方案）
      # 用途：patchright 失败时自动切换
      # 与 Buster 各司其职：
      #   Buster  → 登录页 reCAPTCHA（Playwright launchPersistentContext）
      #   NopeCHA → bypass.city Turnstile（独立 Playwright 实例）
      # =========================
      - name: 下载 NopeCHA 扩展
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha
          wget -q -O extensions/nopecha/chromium.zip \
            https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
          echo "✅ NopeCHA 下载完成"

      - name: 解压 NopeCHA 扩展
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha/unpacked
          7z x -y extensions/nopecha/chromium.zip \
            -oextensions/nopecha/unpacked > /dev/null
          echo "📌 NopeCHA manifest:"
          cat extensions/nopecha/unpacked/manifest.json | \
            python3 -c "import json,sys; m=json.load(sys.stdin); print(f'name={m[\"name\"]} version={m[\"version\"]}')" || \
            ls extensions/nopecha/unpacked/

      # =========================
      # 准备脚本
      # =========================
      - name: 准备 makecoins.js
        run: |
          ls scripts/makecoins.js && echo "✅ makecoins.js 就绪" || \
            (echo "❌ 未找到 makecoins.js" && exit 1)

      - name: 检查 IP
        run: |
          echo "🌍 IP: $(curl -s https://api.ipify.org)"
          curl -s https://ipinfo.io | jq '{ip,city,country,org}' 2>/dev/null || true

      # =========================
      # 运行
      # 浏览器实例说明：
      #   [1] Playwright + Buster  → 登录 reCAPTCHA（头部浏览器）
      #   [2] patchright           → bypass.city Turnstile（主方案）
      #   [3] Playwright + NopeCHA → bypass.city Turnstile（备用方案）
      # 实例 [2][3] 在独立进程中启动，与 [1] 互不干扰
      # =========================
      - name: 运行 makecoins.js
        env:
          TEO_EMAIL:    ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD: ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN:     ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          MAX_RETRY:    "3"
        run: |
          mkdir -p scripts/screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x900x24 -ac" \
            node scripts/makecoins.js
        continue-on-error: true

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teo-screenshots-${{ github.run_id }}
          path: scripts/screenshots/
          if-no-files-found: warn
          retention-days: 7
